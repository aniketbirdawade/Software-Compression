<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<link rel="stylesheet" href="/static/slideshow.css">
</head>

<body>

<h2>Slideshow</h2>

<div id="slideshowContainer" class="slideshow-container"></div>

<div class="buttons">

<button id="prevBtn">Previous</button>
<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>
<button id="nextBtn">Next</button>

<label>
Speed (seconds):
<input type="number" id="speedInput" min="1" value="2">
</label>

<button id="applySpeedBtn">Apply Speed</button>

<button id="fullscreenBtn">Fullscreen</button>

<button id="saveJsonBtn">Save JSON</button>

</div>

<script src="/static/slideshow.js"></script>

</body>
</html>
