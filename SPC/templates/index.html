<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slideshow Image Selector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Image Gallary</h2>

<!-- NORMAL IMAGE SELECTION -->
<input type="file" id="imageInput" multiple accept="image/*">

<div id="imageContainer" class="image-container"></div>

<p id="countText">Images selected for slideshow: 0</p>

<button id="saveBtn">Save Images</button>

<hr style="margin: 25px 0;">

<!-- IMPORT JSON -->
<h3>OR</h3>
<button id="importJsonBtn">Import Slideshow JSON</button>
<input type="file" id="jsonInput" accept=".json" hidden>

<script src="/static/index.js"></script>
</body>
</html>
