<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>New Slideshow</title>

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='index.css') }}"
  >
</head>

<body>

  <!-- HEADER -->
  <div class="page-header">

    <a href="/dashboard" class="back-btn">
      ← Back
    </a>

    <h2>Create New Slideshow</h2>

  </div>

  <!-- CREATE CATEGORY -->
  <div class="section">

    <h3>Create New Category</h3>

    <input
      type="text"
      id="newCategoryInput"
      placeholder="Enter category name"
    >

    <button id="createCategoryBtn">
      Create Category
    </button>

  </div>

  <hr>

  <!-- CATEGORY SELECT -->
  <div class="section">

    <h3>Choose From Saved Gallery</h3>

    <select id="categorySelect">

      <option value="">
        Select Category
      </option>

    </select>

  </div>

  <!-- UPLOAD TO CATEGORY -->
  <div class="section">

    <h3>Upload Images To Selected Category</h3>

    <input
      type="file"
      id="galleryUploadInput"
      multiple
      accept="image/*"
    >

    <button id="uploadGalleryBtn">
      Upload Images
    </button>

  </div>

  <hr>

  <!-- NORMAL IMAGE SELECT -->
  <div class="section">

    <h3 id="slideshowSelectTitle">
      Select Images For Slideshow
    </h3>

    <input
      type="file"
      id="imageInput"
      multiple
      accept="image/*"
    >

  </div>

  <!-- IMAGE GRID -->
  <div
    id="imageContainer"
    class="image-container"
  ></div>

  <!-- COUNT -->
  <p
    id="countText"
    class="count-text"
  >
    Images selected for slideshow: 0
  </p>

  <!-- SAVE -->
  <div class="section">

    <button
      id="saveBtn"
      class="save-btn"
    >
      Save & Continue →
    </button>

  </div>

  <hr>

  <!-- IMPORT JSON -->
  <div class="section">

    <h3>OR Import Existing JSON</h3>

    <button
      id="importJsonBtn"
      class="import-btn"
    >
      Import Slideshow JSON
    </button>

    <input
      type="file"
      id="jsonInput"
      accept=".json"
      hidden
    >

  </div>

  <!-- SCRIPT -->
  <script
    src="{{ url_for('static', filename='index.js') }}"
  ></script>

</body>

</html>
