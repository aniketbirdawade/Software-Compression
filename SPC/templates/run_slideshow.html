<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slideshow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='slideshow.css') }}">
</head>
<body>

  <div class="page-header">
    <a href="/dashboard" class="back-btn">← Dashboard</a>
    <h2>Slideshow</h2>
  </div>

  <div id="slideshowContainer" class="slideshow-container"></div>

  <div class="controls" id="controls">
    <button id="prevBtn"> Prev</button>
    <button id="startBtn"> Start</button>
    <button id="stopBtn"> Stop</button>
    <button id="nextBtn">Next </button>

    <label class="speed-label">
      Speed (sec):
      <input type="number" id="speedInput" min="0.5" step="0.5">
    </label>
    <button id="applySpeedBtn">Apply</button>

    <button id="fullscreenBtn">⛶ Fullscreen</button>
    <button id="saveJsonBtn"> Save JSON</button>
  </div>

  <!-- Safe data passing — base64 strings can contain quotes so we use script tags -->
  <script type="application/json" id="imagesData">{{ images | tojson | safe }}</script>
  <script type="application/json" id="speedData">{{ speed | tojson | safe }}</script>

  <script>
    window.selectedImages = JSON.parse(document.getElementById('imagesData').textContent);
    window.slideSpeed = JSON.parse(document.getElementById('speedData').textContent);
    window.buttonPositions = {};
  </script>

  <script src="{{ url_for('static', filename='slideshow.js') }}"></script>
</body>
</html>
