<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Slideshow</title>
    <link rel="stylesheet" href="slideshow.css">
</head>

<body>
    <h2>Slideshow</h2>

    <div class="slideshow-container" id="slideshowContainer">

    </div>

    <script src="slideshow.js"></script>
</body>

</html>
