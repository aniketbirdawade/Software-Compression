<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom Slideshow Selector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Slideshow Image Selector</h2>

    <input type="file" id="imageInput" multiple accept="image/*">

    <div id="imageContainer" class="image-container"></div>

    <p id="countText">Images selected for slideshow: 0</p>

    <button id="saveBtn">Save Images</button>
    
    <script src="index.js"></script>
</body>

</html>
