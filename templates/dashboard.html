<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Dashboard.css') }}">
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>My Slideshows</h3>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>

    {% if files %}
      {% for file in files %}
      <div class="file-item">
        <span class="file-name"> {{ file }}</span>
        <div class="file-actions">
          <button class="play-btn" onclick="runSlideshow('{{ file }}')">▶ Play</button>
          <button class="delete-btn" onclick="deleteFile('{{ file }}')">Delete</button>

          <button onclick="downloadFile('{{ file }}')">Save JSON</button>

        </div>
      </div>
      {% endfor %}
    {% else %}
      <p class="empty-msg">No slideshows yet.</p>
    {% endif %}
  </div>

  <!-- RIGHT PANEL -->
  <div class="content">
    <div class="center-box">
      <h2>Welcome, {{ session['user'] }} </h2>
      <p>Create a new slideshow or play an existing one from the left panel.</p>
      <button class="create-btn" onclick="createNew()">+ New Slideshow</button>

      <div class="import-section">
        <p>Or import a saved JSON file:</p>
        <input type="file" id="importInput" accept=".json" hidden>
        <button class="import-btn" onclick="document.getElementById('importInput').click()">
           Import JSON
        </button>
      </div>
    </div>
  </div>

  <script>
    function runSlideshow(file) {
      window.location.href = "/run/" + file;
    }

    function createNew() {
      window.location.href = "/index";
    }

    function deleteFile(file) {
      if (confirm("Delete " + file + "?")) {
        window.location.href = "/delete/" + file;
      }
    }

    // Import JSON from dashboard → go to preview via localStorage
    document.getElementById("importInput").onchange = function () {
      const file = this.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);

          if (!data.images || !Array.isArray(data.images)) {
            alert("Invalid slideshow JSON file");
            return;
          }

          const images = data.images
            .sort((a, b) => a.order - b.order)
            .map(img => img.src);

          localStorage.setItem("selectedImages", JSON.stringify(images));
          localStorage.setItem("slideSpeed", data.slideSpeed || 2);

          window.location.href = "/preview";
        } catch (err) {
          alert("Failed to read JSON file");
        }
      };
      reader.readAsText(file);
    };

    /* -------- SAVE JSON (download) -------- */
function downloadFile(file) {
  fetch("/download/" + file)
    .then(res => res.json())
    .then(data => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = file;
      a.click();
      URL.revokeObjectURL(a.href);
    })
    .catch(() => alert("Failed to download."));
}
  </script>
</body>
</html>
