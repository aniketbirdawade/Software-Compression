<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview & Customize</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='preview.css') }}">
</head>
<body>

  <div class="page-header">
    <a href="/index" class="back-btn">← Back</a>
    <h2>Preview & Customize</h2>
  </div>

  <p class="hint">Drag images to reorder them.</p>

  <div class="image-grid" id="imageGrid"></div>

  <div class="customize-section">
    <p class="hint">Customize button positions for the slideshow screen:</p>
    <button id="customizeBtn" class="action-btn"> Customize Buttons</button>
  </div>

  <!-- Draggable dummy buttons preview -->
  <div class="button-preview" id="dummyButtons">
    <button id="btn-prev" class="dummy-btn">Previous</button>
    <button id="btn-start" class="dummy-btn">Start</button>
    <button id="btn-stop" class="dummy-btn">Stop</button>
    <button id="btn-next" class="dummy-btn">Next</button>
  </div>

  <div class="ready-section">
    <button id="readyBtn" class="ready-btn">▶ Start Slideshow</button>
  </div>

  <script src="{{ url_for('static', filename='preview.js') }}"></script>
</body>
</html>
